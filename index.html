<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Упаковка паллеты 122x82 см — PRO-версия</title>
    <style>
        body {
            margin: 0; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f0f1a; color: #eee;
        }
        #sidebar {
            position: absolute; top: 20px; left: 20px; bottom: 20px; width: 380px;
            display: flex; flex-direction: column; gap: 20px; pointer-events: none;
            z-index: 10; overflow-y: auto; padding-right: 6px;
        }
        .panel {
            background: rgba(25,30,45,0.9); backdrop-filter: blur(8px);
            padding: 18px 22px; border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.7); border: 1px solid #3a4a6a;
            pointer-events: auto; flex-shrink: 0;
        }
        .panel h3 { margin: 0 0 12px; color: #ffaa00; font-size: 1.2rem; }
        .box-form { display: flex; flex-direction: column; gap: 12px; }
        .input-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .input-group { display: flex; gap: 6px; align-items: center; }
        .input-group label { width: 20px; color: #ccc; }
        .input-group input {
            width: 65px; padding: 8px; border-radius: 8px;
            border: 1px solid #556688; background: #1e2a3a; color: white;
        }
        .box-list {
            max-height: 200px; overflow-y: auto; margin: 10px 0;
            border: 1px solid #3a4a6a; border-radius: 8px; padding: 6px;
            background: #151e28;
        }
        .box-item {
            display: flex; justify-content: space-between; align-items: center; padding: 6px 8px;
            border-bottom: 1px solid #2a3a4a; color: #ddd;
            cursor: pointer; transition: background 0.2s; gap: 6px;
        }
        .box-item:hover { background: #2a3a5a; }
        .box-item.selected { background: #3a5a7a; border-left: 3px solid #ffaa00; }
        .box-item button {
            border: none; color: white; border-radius: 20px;
            padding: 2px 8px; cursor: pointer; font-weight: bold;
        }
        .btn {
            background: #2a4a6a; color: white; border: none; padding: 10px 18px;
            border-radius: 30px; font-weight: bold; cursor: pointer;
            border: 1px solid #4a6a8a;
        }
        .btn-primary { background: #ffaa00; color: #111; border-color: #ffcc66; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #stats-panel { display: flex; flex-direction: column; gap: 12px; }
        .stat-row { display: flex; justify-content: space-between; align-items: baseline; }
        .stat-label { font-size: 0.9rem; color: #aaa; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #ffaa00; line-height: 1.2; }
        .stat-small { font-size: 1.2rem; }
        #status-bar {
            position: absolute; bottom: 20px; left: 420px; right: 20px;
            background: rgba(0,0,0,0.6); color: #ffaa00; padding: 8px 20px;
            border-radius: 40px; backdrop-filter: blur(4px); z-index: 15;
            border: 1px solid #ffaa0050; pointer-events: none; text-align: center;
        }
        .box-letter {
            display: inline-block; background: #ffaa00; color: #000; font-weight: bold;
            border-radius: 50%; width: 22px; height: 22px; text-align: center;
            line-height: 22px; margin-right: 8px;
        }
        .count-controls {
            display: flex; gap: 4px; align-items: center; margin-left: 6px;
        }
        .count-controls button {
            background: #2a4a6a; padding: 2px 8px; border-radius: 12px; min-width: 24px;
        }
        #sidebar::-webkit-scrollbar { width: 6px; }
        #sidebar::-webkit-scrollbar-thumb { background: #3a4a6a; border-radius: 6px; }
        @media (max-width: 800px) {
            #sidebar { width: 320px; }
            #status-bar { left: 340px; }
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="panel">
            <h3>📋 Товары</h3>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <select id="product-select" style="background:#1e2a3a; color:white; padding:8px; border-radius:8px; border:1px solid #556688;">
                </select>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <span style="color:#aaa;">Кол:</span>
                    <input id="product-cnt" type="number" value="1" min="1" max="100" step="1" style="width:70px; background:#1e2a3a; color:white; padding:8px; border-radius:8px; border:1px solid #556688;">
                    <button class="btn" id="add-product-btn">➕</button>
                </div>
                <div id="product-dimensions" style="color:#aaa; font-size:0.8rem; margin-top:4px;"></div>
            </div>
        </div>

        <div class="panel">
            <h3>📦 Коробки (см)</h3>
            <div class="box-form">
                <div class="input-row">
                    <div class="input-group"><label>Ш</label><input id="inp-w" value="30" type="number" step="1" min="1" max="150"></div>
                    <div class="input-group"><label>Г</label><input id="inp-d" value="20" type="number" step="1" min="1" max="150"></div>
                    <div class="input-group"><label>В</label><input id="inp-h" value="25" type="number" step="1" min="1" max="150"></div>
                    <div class="input-group"><label>Кол</label><input id="inp-cnt" value="2" type="number" step="1" min="1" max="100"></div>
                    <button class="btn" id="add-btn" style="flex:1;">➕</button>
                </div>
                <div class="box-list" id="box-list-container"></div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="btn" id="clear-boxes">🗑️ Очистить</button>
                    <button class="btn" id="reset-highlight">🔍 Снять выделение</button>
                    <button class="btn" id="toggle-labels">🔤 Подписи (вкл)</button>
                </div>
            </div>
        </div>
        <div class="panel">
            <h3>⚙️ Параметры</h3>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <div style="display: flex; justify-content: space-between;">
                    <span>Популяция:</span>
                    <select id="pop-size" style="background:#1e2a3a; color:white; padding:5px; border-radius:8px; width:100px;">
                        <option value="200">200</option><option value="400" selected>400</option>
                        <option value="600">600</option><option value="800">800</option><option value="1000">1000</option>
                    </select>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span>Поколений:</span>
                    <select id="generations" style="background:#1e2a3a; color:white; padding:5px; border-radius:8px; width:100px;">
                        <option value="100">100</option><option value="200" selected>200</option>
                        <option value="300">300</option><option value="400">400</option><option value="500">500</option>
                    </select>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span>Макс. высота (м):</span>
                    <input id="max-height" type="number" value="2.0" min="0.3" max="2.5" step="0.1" style="width:80px; background:#1e2a3a; color:white; padding:5px; border-radius:8px; border:1px solid #556688;">
                </div>
                <button class="btn btn-primary" id="start-ga">🚀 Запустить эволюцию</button>
                <button class="btn" id="stop-reset">🔄 Сбросить вид</button>
            </div>
        </div>
        <div class="panel" id="stats-panel">
            <div class="stat-row"><span class="stat-label">📦 Уложено</span><span class="stat-value" id="packed-count">0/0</span></div>
            <div class="stat-row"><span class="stat-label">📐 Объём коробок</span><span class="stat-value stat-small" id="total-volume">0.000</span><span style="color:#aaa;"> м³</span></div>
            <div class="stat-row"><span class="stat-label">📊 Заполнено</span><span class="stat-value stat-small" id="filled-volume">0.000</span><span style="color:#aaa;"> м³</span></div>
            <div class="stat-row"><span class="stat-label">📈 Эффективность</span><span class="stat-value stat-small" id="efficiency">0.0</span><span style="color:#aaa;"> %</span></div>
            <div class="stat-row"><span class="stat-label">🧬 Поколение</span><span class="stat-value" id="gen-count">0</span></div>
            <div class="stat-row"><span class="stat-label">🎯 Фитнес</span><span class="stat-value" id="best-fitness">0</span></div>
        </div>
    </div>
    <div id="status-bar">🟢 PRO-режим. Паллета 122×82 см. Добавьте коробки.</div>

    <script type="importmap">
        {"imports":{
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }}
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

        // ---------- СПРАВОЧНИК ТОВАРОВ ----------
        const PRODUCTS = [
            { name: "MI_RP_X20+", w: 0.41, d: 0.64, h: 0.42 },
            { name: "MI_RP_X10+", w: 0.62, d: 0.49, h: 0.39 },
            { name: "MI_M_G27_P27FDA-RG", w: 0.13, d: 0.69, h: 0.44 },
            { name: "MI_M_G25_P25FDA-RG", w: 0.10, d: 0.69, h: 0.40 },
            { name: "MI_M_GPRO27Q_P27QDA-RGP", w: 0.14, d: 0.86, h: 0.46 },
            { name: "MI_M_X27GQ_P27QCA-RX", w: 0.11, d: 0.69, h: 0.43 },
            { name: "MI_M_G34WQ_C34WQBA-RG", w: 0.17, d: 0.96, h: 0.46 },
            { name: "MI_P_G20MAX", w: 0.37, d: 0.72, h: 0.16 },
            { name: "MI_BS_SP_MDZ-39-DB", w: 0.39, d: 0.40, h: 0.31 },
            { name: "MI_BS_SO_MDZ-38-DB", w: 0.27, d: 0.23, h: 0.31 },
            { name: "MI_ROUTER_BE3600", w: 0.24, d: 0.48, h: 0.55 },
            { name: "MI_B_SPORT", w: 0.20, d: 0.30, h: 0.30 },
            { name: "MI_M_G27Q_P27QDB-RG", w: 0.69, d: 0.14, h: 0.46 },
            { name: "MI_M_G27Q_P27QDC-RG", w: 0.86, d: 0.14, h: 0.46 },
            { name: "MI_M_GPRO27U_P27UDA-RGP", w: 0.14, d: 0.86, h: 0.46 },
            { name: "MI_RB_BUDS8_LITE", w: 0.32, d: 0.44, h: 0.35 },
            { name: "MI_M_G27U_P27UDA-RG", w: 0.86, d: 0.14, h: 0.46 },
            { name: "MI_ROUTER_AX3000T", w: 0.39, d: 0.37, h: 0.50 },
            { name: "MI_VESY_S200", w: 0.31, d: 0.36, h: 0.32 },
            { name: "MI_IPC_MJSXJ09CM", w: 0.38, d: 0.19, h: 0.36 },
            { name: "MI_TV_STICK_HD_2nd", w: 0.48, d: 0.25, h: 0.20 },
            { name: "MI_TV_STICK_4K_2nd_RU", w: 0.42, d: 0.29, h: 0.20 },
            { name: "MI_PROJECTOR_L1", w: 0.49, d: 0.42, h: 0.48 }
        ];

        // ---------- ГАБАРИТЫ ПАЛЛЕТЫ 122x82 см ----------
        const AREA_W = 1.22;
        const AREA_D = 0.82;
        const MAX_BOX_DIM = 1.5;   // <-- ИЗМЕНЕНО: было 1.0 (100 см), теперь 1.5 (150 см)
        const COLORS = [0xe67e22, 0x3498db, 0x2ecc71, 0xe74c3c, 0xf1c40f, 0x9b59b6, 0x1abc9c];

        // ---------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------
        let boxesData = [];
        let flatBoxes = [];
        let totalCount = 0;
        let worker = null;
        let isRunning = false;
        let currentMeshes = [];
        let labelsVisible = true;
        const geometryCache = new Map();

        const elements = {
            list: document.getElementById('box-list-container'),
            packed: document.getElementById('packed-count'),
            gen: document.getElementById('gen-count'),
            fitness: document.getElementById('best-fitness'),
            status: document.getElementById('status-bar'),
            totalVolume: document.getElementById('total-volume'),
            filledVolume: document.getElementById('filled-volume'),
            efficiency: document.getElementById('efficiency'),
            inpW: document.getElementById('inp-w'),
            inpD: document.getElementById('inp-d'),
            inpH: document.getElementById('inp-h'),
            inpCnt: document.getElementById('inp-cnt'),
            maxHeight: document.getElementById('max-height'),
            popSize: document.getElementById('pop-size'),
            generations: document.getElementById('generations'),
            startBtn: document.getElementById('start-ga'),
            resetBtn: document.getElementById('stop-reset'),
            resetHighlightBtn: document.getElementById('reset-highlight'),
            addBtn: document.getElementById('add-btn'),
            clearBtn: document.getElementById('clear-boxes'),
            toggleLabelsBtn: document.getElementById('toggle-labels'),
            productSelect: document.getElementById('product-select'),
            productCnt: document.getElementById('product-cnt'),
            addProductBtn: document.getElementById('add-product-btn'),
            productDims: document.getElementById('product-dimensions')
        };

        // ---------- ЗАПОЛНЕНИЕ ВЫПАДАЮЩЕГО СПИСКА ТОВАРОВ ----------
        function populateProductSelect() {
            const select = elements.productSelect;
            PRODUCTS.forEach(p => {
                const option = document.createElement('option');
                option.value = p.name;
                option.textContent = `${p.name} (${Math.round(p.w*100)}×${Math.round(p.d*100)}×${Math.round(p.h*100)})`;
                select.appendChild(option);
            });
            if (PRODUCTS.length > 0) {
                const first = PRODUCTS[0];
                elements.productDims.textContent = `Размеры: ${Math.round(first.w*100)}×${Math.round(first.d*100)}×${Math.round(first.h*100)} см`;
            }
        }

        elements.productSelect.addEventListener('change', () => {
            const idx = elements.productSelect.selectedIndex;
            if (idx >= 0 && idx < PRODUCTS.length) {
                const p = PRODUCTS[idx];
                elements.productDims.textContent = `Размеры: ${Math.round(p.w*100)}×${Math.round(p.d*100)}×${Math.round(p.h*100)} см`;
            } else {
                elements.productDims.textContent = '';
            }
        });

        // ---------- СЦЕНА ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f1420);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(2.3, 1.9, 2.9);
        camera.lookAt(AREA_W/2, 0.5, AREA_D/2);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(AREA_W/2, 0.35, AREA_D/2);

        scene.add(new THREE.AmbientLight(0x606080, 1.0));
        const dirLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        dirLight.position.set(2, 5, 3);
        dirLight.castShadow = true; dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024; dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.left = -2; dirLight.shadow.camera.right = 2;
        dirLight.shadow.camera.top = 2; dirLight.shadow.camera.bottom = -2;
        dirLight.shadow.camera.near = 0.5; dirLight.shadow.camera.far = 10;
        scene.add(dirLight);
        const backLight = new THREE.DirectionalLight(0xccddff, 0.6);
        backLight.position.set(-1.5, 0.5, -2);
        scene.add(backLight);
        scene.add(new THREE.PointLight(0x4466ff, 0.4));
        scene.add(new THREE.PointLight(0xffaa66, 0.4));

        // ---------- ПОСТРОЕНИЕ ПАЛЛЕТЫ ----------
        const palletGroup = new THREE.Group();
        const textureLoader = new THREE.TextureLoader();
        const woodTexture = textureLoader.load('https://threejs.org/examples/textures/hardwood2_diffuse.jpg');
        woodTexture.wrapS = THREE.RepeatWrapping; woodTexture.wrapT = THREE.RepeatWrapping;
        woodTexture.repeat.set(2, 1);
        const woodMaterial = new THREE.MeshStandardMaterial({ map: woodTexture, roughness: 0.7, metalness: 0.05, color: 0xd2b48c });

        const blockH = 0.078, bottomH = 0.022, crossH = 0.022, topH = 0.022;
        const totalH = blockH + bottomH + crossH + topH;
        const roundRadius = 0.003;

        const bottomWidths = [0.100, 0.145, 0.100];
        const bottomZCenters = [0.05, AREA_D / 2, AREA_D - 0.05];
        bottomWidths.forEach((w, i) => {
            const geo = new RoundedBoxGeometry(AREA_W, bottomH, w, 2, roundRadius);
            const board = new THREE.Mesh(geo, woodMaterial);
            board.position.set(AREA_W/2, -totalH + bottomH/2, bottomZCenters[i]);
            board.castShadow = true; board.receiveShadow = true;
            palletGroup.add(board);
        });

        const edgeDistX = 0.0725, edgeDistZ = 0.0725;
        const blockPositions = [
            { x: edgeDistX, z: edgeDistZ }, { x: edgeDistX, z: AREA_D - edgeDistZ },
            { x: AREA_W - edgeDistX, z: edgeDistZ }, { x: AREA_W - edgeDistX, z: AREA_D - edgeDistZ },
            { x: edgeDistX, z: AREA_D/2, w:0.145, d:0.100 }, { x: AREA_W - edgeDistX, z: AREA_D/2, w:0.145, d:0.100 },
            { x: AREA_W/2, z: edgeDistZ, w:0.145, d:0.100 }, { x: AREA_W/2, z: AREA_D - edgeDistZ, w:0.145, d:0.100 },
            { x: AREA_W/2, z: AREA_D/2, w:0.145, d:0.100 }
        ];
        blockPositions.forEach(bp => {
            const w = bp.w || 0.145, d = bp.d || 0.145;
            const geo = new RoundedBoxGeometry(w, blockH, d, 2, roundRadius);
            const block = new THREE.Mesh(geo, woodMaterial);
            block.position.set(bp.x, -totalH + bottomH + blockH/2, bp.z);
            block.castShadow = true; block.receiveShadow = true;
            palletGroup.add(block);
        });

        const crossXCenters = [edgeDistX, AREA_W/2, AREA_W - edgeDistX];
        crossXCenters.forEach(x => {
            const geo = new RoundedBoxGeometry(0.145, crossH, AREA_D, 2, roundRadius);
            const cross = new THREE.Mesh(geo, woodMaterial);
            cross.position.set(x, -totalH + bottomH + blockH + crossH/2, AREA_D/2);
            cross.castShadow = true; cross.receiveShadow = true;
            palletGroup.add(cross);
        });

        const topWidths = [0.145, 0.100, 0.145, 0.100, 0.145];
        const topTotalWidth = topWidths.reduce((a, b) => a + b, 0);
        const topGaps = (AREA_D - topTotalWidth) / (topWidths.length - 1);
        let zPosTop = 0;
        topWidths.forEach((w, i) => {
            const geo = new RoundedBoxGeometry(AREA_W, topH, w, 2, roundRadius);
            const board = new THREE.Mesh(geo, woodMaterial);
            board.position.set(AREA_W/2, -totalH + bottomH + blockH + crossH + topH/2, zPosTop + w/2);
            board.castShadow = true; board.receiveShadow = true;
            palletGroup.add(board);
            zPosTop += w + (i < topWidths.length - 1 ? topGaps : 0);
        });
        scene.add(palletGroup);

        const borderMaterial = new THREE.LineBasicMaterial({ color: 0xffaa00 });
        const borderPoints = [
            new THREE.Vector3(0, 0.001, 0), new THREE.Vector3(AREA_W, 0.001, 0),
            new THREE.Vector3(AREA_W, 0.001, AREA_D), new THREE.Vector3(0, 0.001, AREA_D),
            new THREE.Vector3(0, 0.001, 0)
        ];
        scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(borderPoints), borderMaterial));

        const sizeLabelDiv = document.createElement('div');
        sizeLabelDiv.textContent = '122 × 82 см';
        sizeLabelDiv.style.cssText = 'color:#ccc;font-size:12px;background:#00000080;padding:2px 8px;border-radius:12px;';
        const sizeLabel = new CSS2DObject(sizeLabelDiv);
        sizeLabel.position.set(AREA_W/2, 0.1, AREA_D/2);
        scene.add(sizeLabel);
        const boxesGroup = new THREE.Group();
        scene.add(boxesGroup);

        // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
        function getLetter(index) { let n = index, result = ''; while (n >= 0) { result = String.fromCharCode(65 + (n % 26)) + result; n = Math.floor(n / 26) - 1; } return result; }
        function calculateTotalVolume() { return boxesData.reduce((s, b) => s + b.w * b.d * b.h * b.count, 0); }
        function updateVolumeStats(_, placedVolume = null) {
            const maxH = parseFloat(elements.maxHeight.value) || 2.0;
            const maxVol = AREA_W * AREA_D * maxH;
            const totalVol = calculateTotalVolume();
            elements.totalVolume.textContent = totalVol.toFixed(3);
            elements.filledVolume.textContent = placedVolume !== null ? placedVolume.toFixed(3) : '0.000';
            elements.efficiency.textContent = (maxVol > 0 ? ((placedVolume || 0) / maxVol * 100) : 0).toFixed(1);
        }
        function rebuildFlatBoxes() {
            flatBoxes = [];
            boxesData.forEach((b, typeIdx) => {
                for (let i = 0; i < b.count; i++) {
                    flatBoxes.push({ w:b.w, d:b.d, h:b.h, color:b.color, letter:b.letter, typeIdx, productName: b.productName || '' });
                }
            });
            totalCount = flatBoxes.length;
            updateVolumeStats();
        }

        function changeBoxCount(index, delta) {
            if (isRunning) { elements.status.textContent = '⚠️ Дождитесь завершения или сбросьте процесс'; return; }
            const newCount = boxesData[index].count + delta;
            if (newCount <= 0) {
                boxesData.splice(index, 1);
            } else {
                boxesData[index].count = newCount;
            }
            boxesData.forEach((b, i) => b.letter = getLetter(i));
            renderBoxList();
            visualize([]);
        }

        function createBoxItemElement(b, index) {
            const div = document.createElement('div');
            div.className = 'box-item';
            div.dataset.letter = b.letter;
            const volume = (b.w * b.d * b.h).toFixed(4);
            
            const span = document.createElement('span');
            const letterSpan = document.createElement('span');
            letterSpan.className = 'box-letter';
            letterSpan.textContent = b.letter;
            span.appendChild(letterSpan);
            const namePart = b.productName ? `${b.productName} ` : '';
            span.appendChild(document.createTextNode(`${namePart}${Math.round(b.w*100)}x${Math.round(b.d*100)}x${Math.round(b.h*100)}`));
            const volSpan = document.createElement('span');
            volSpan.style.cssText = 'color:#aaa;font-size:0.8rem;';
            volSpan.textContent = ` ${volume} м³`;
            span.appendChild(volSpan);

            const countControls = document.createElement('span');
            countControls.className = 'count-controls';
            const decBtn = document.createElement('button');
            decBtn.textContent = '−';
            decBtn.addEventListener('click', (e) => { e.stopPropagation(); changeBoxCount(index, -1); });
            const cntSpan = document.createElement('span');
            cntSpan.textContent = b.count;
            cntSpan.style.padding = '0 4px';
            const incBtn = document.createElement('button');
            incBtn.textContent = '+';
            incBtn.addEventListener('click', (e) => { e.stopPropagation(); changeBoxCount(index, 1); });
            countControls.appendChild(decBtn);
            countControls.appendChild(cntSpan);
            countControls.appendChild(incBtn);

            const removeBtn = document.createElement('button');
            removeBtn.textContent = '✖';
            removeBtn.style.background = '#aa3333';
            removeBtn.addEventListener('click', (e) => { e.stopPropagation(); removeBox(index); });

            div.appendChild(span);
            div.appendChild(countControls);
            div.appendChild(removeBtn);
            div.addEventListener('click', (e) => { if (e.target.tagName !== 'BUTTON') highlightByLetter(b.letter); });
            return div;
        }

        function renderBoxList() {
            elements.list.innerHTML = '';
            boxesData.forEach((b, i) => elements.list.appendChild(createBoxItemElement(b, i)));
            rebuildFlatBoxes();
            elements.packed.textContent = `0/${totalCount}`;
            elements.fitness.textContent = '0';
        }

        function removeBox(index) {
            if (isRunning) { elements.status.textContent = '⚠️ Дождитесь завершения процесса'; return; }
            boxesData.splice(index, 1);
            boxesData.forEach((b, i) => b.letter = getLetter(i));
            renderBoxList();
            visualize([]);
        }

        function highlightByLetter(letter) {
            let found = false;
            currentMeshes.forEach(item => {
                if (!item.mesh) return;
                const needHighlight = (item.letter === letter);
                if (needHighlight) found = true;
                if (!item.originalMaterial) item.originalMaterial = item.mesh.material;
                if (needHighlight) {
                    item.mesh.material = item.originalMaterial;
                    if (Array.isArray(item.mesh.material)) item.mesh.material.forEach(m => { m.transparent = false; m.opacity = 1; m.depthWrite = true; });
                    else { item.mesh.material.transparent = false; item.mesh.material.opacity = 1; item.mesh.material.depthWrite = true; }
                } else {
                    const color = item.originalMaterial.color || new THREE.Color(0xffffff);
                    const transparentMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.2, depthWrite: false });
                    item.mesh.material = transparentMat;
                }
            });
            document.querySelectorAll('.box-item').forEach(el => {
                el.classList.remove('selected');
                if (el.dataset.letter === letter && found) el.classList.add('selected');
            });
            if (!found) resetHighlight();
        }

        function resetHighlight() {
            currentMeshes.forEach(item => {
                if (!item.mesh || !item.originalMaterial) return;
                item.mesh.material = item.originalMaterial;
                if (Array.isArray(item.mesh.material)) item.mesh.material.forEach(m => { m.transparent = false; m.opacity = 1; m.depthWrite = true; });
                else { item.mesh.material.transparent = false; item.mesh.material.opacity = 1; item.mesh.material.depthWrite = true; }
            });
            document.querySelectorAll('.box-item').forEach(el => el.classList.remove('selected'));
        }

        function updateLabelsVisibility() { currentMeshes.forEach(i => i.label && (i.label.visible = labelsVisible)); }
        function toggleLabels() {
            labelsVisible = !labelsVisible;
            elements.toggleLabelsBtn.textContent = labelsVisible ? '🔤 Подписи (вкл)' : '🔤 Подписи (выкл)';
            updateLabelsVisibility();
        }

        function visualize(placed) {
            while (boxesGroup.children.length > 0) {
                const child = boxesGroup.children[0];
                if (child.isCSS2DObject) labelRenderer.domElement.removeChild(child.element);
                else if (child.isMesh) { child.geometry?.dispose(); if (Array.isArray(child.material)) child.material.forEach(m => m.dispose()); else child.material?.dispose(); }
                else if (child.isLine) { child.geometry.dispose(); if (Array.isArray(child.material)) child.material.forEach(m => m.dispose()); else child.material?.dispose(); }
                boxesGroup.remove(child);
            }
            currentMeshes = [];
            if (!placed?.length) { elements.packed.textContent = `0/${totalCount}`; updateVolumeStats(); return; }

            let placedVolume = 0;
            placed.forEach(item => {
                const { dims, pos, color, letter, productName } = item;
                const [w, h, d] = dims;
                placedVolume += w * h * d;
                const cacheKey = `${w.toFixed(3)},${h.toFixed(3)},${d.toFixed(3)}`;
                let geo = geometryCache.get(cacheKey);
                if (!geo) { geo = new THREE.BoxGeometry(w, h, d); geometryCache.set(cacheKey, geo); }
                const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.4 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.castShadow = true; mesh.receiveShadow = true;
                mesh.position.set(pos.x + w/2, pos.y + h/2, pos.z + d/2);
                boxesGroup.add(mesh);

                const edges = new THREE.EdgesGeometry(geo);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
                line.position.copy(mesh.position);
                boxesGroup.add(line);

                const original = boxesData.find(b => b.letter === letter);
                const nameText = productName ? `${productName} ` : '';
                const dimText = `${Math.round(w*100)}×${Math.round(h*100)}×${Math.round(d*100)}`;
                const labelDiv = document.createElement('div');
                labelDiv.textContent = `${letter} ${nameText}${dimText}`;
                labelDiv.style.cssText = 'color:#fff;font-size:10px;background:#000c;padding:2px 6px;border-radius:10px;font-weight:bold;pointer-events:none;';
                const labelObj = new CSS2DObject(labelDiv);
                labelObj.position.set(pos.x + w/2, pos.y + h + 0.03, pos.z + d/2);
                labelObj.visible = labelsVisible;
                boxesGroup.add(labelObj);
                currentMeshes.push({ mesh, line, letter, label: labelObj, originalMaterial: mat });
            });

            elements.packed.textContent = `${placed.length}/${totalCount}`;
            elements.fitness.textContent = `${placed.length}/${totalCount}`;
            updateVolumeStats(placed.length, placedVolume);
            resetHighlight();
        }

        function addBox() {
            const w = parseFloat(elements.inpW.value) / 100;
            const d = parseFloat(elements.inpD.value) / 100;
            const h = parseFloat(elements.inpH.value) / 100;
            const cnt = parseInt(elements.inpCnt.value, 10);
            if (isNaN(w) || isNaN(d) || isNaN(h) || isNaN(cnt) || w<=0 || d<=0 || h<=0 || cnt<=0 || w>MAX_BOX_DIM || d>MAX_BOX_DIM || h>MAX_BOX_DIM || cnt>100) {
                elements.status.textContent = '⚠️ Проверьте размеры (1-150 см) и количество (1-100)';  // <-- текст ошибки обновлён
                return;
            }
            const existing = boxesData.find(b => Math.abs(b.w - w) < 1e-6 && Math.abs(b.d - d) < 1e-6 && Math.abs(b.h - h) < 1e-6);
            if (existing) {
                existing.count += cnt;
            } else {
                boxesData.push({ w, d, h, count: cnt, color: COLORS[boxesData.length % COLORS.length], letter: getLetter(boxesData.length), productName: null });
            }
            boxesData.forEach((b, i) => b.letter = getLetter(i));
            renderBoxList();
            visualize([]);
            elements.status.textContent = '✅ Коробка добавлена';
        }

        function addProduct() {
            const idx = elements.productSelect.selectedIndex;
            if (idx < 0 || idx >= PRODUCTS.length) { elements.status.textContent = '⚠️ Выберите товар'; return; }
            const product = PRODUCTS[idx];
            const cnt = parseInt(elements.productCnt.value, 10);
            if (isNaN(cnt) || cnt <= 0 || cnt > 100) { elements.status.textContent = '⚠️ Количество от 1 до 100'; return; }
            const existing = boxesData.find(b => Math.abs(b.w - product.w) < 1e-6 && Math.abs(b.d - product.d) < 1e-6 && Math.abs(b.h - product.h) < 1e-6 && b.productName === product.name);
            if (existing) {
                existing.count += cnt;
            } else {
                boxesData.push({
                    w: product.w, d: product.d, h: product.h,
                    count: cnt,
                    color: COLORS[boxesData.length % COLORS.length],
                    letter: getLetter(boxesData.length),
                    productName: product.name
                });
            }
            boxesData.forEach((b, i) => b.letter = getLetter(i));
            renderBoxList();
            visualize([]);
            elements.status.textContent = `✅ Товар "${product.name}" добавлен (${cnt} шт.)`;
        }

        // ---------- PRO ВОРКЕР ----------
        const PRO_WORKER_CODE = `
            const areaW = 1.22, areaD = 0.82, overhang = 0.01;
            const minX = -overhang, maxX = areaW + overhang, minZ = -overhang, maxZ = areaD + overhang, floorLevel = 0.0;
            let boxes = [], maxHglobal = 2.0;
            function ors(w,d,h){ return [[w,h,d],[d,h,w],[h,w,d],[h,d,w],[w,d,h],[d,w,h]]; }
            function checkSupport(pos, dims, placed) {
                const [bw, bh, bd] = dims;
                if (pos.y <= floorLevel + 1e-6) return true;
                let supportArea = 0;
                for (const p of placed) {
                    const [pw, ph, pd] = p.dims;
                    if (Math.abs(p.pos.y + ph - pos.y) > 1e-4) continue;
                    supportArea += Math.max(0, Math.min(pos.x + bw, p.pos.x + pw) - Math.max(pos.x, p.pos.x)) * Math.max(0, Math.min(pos.z + bd, p.pos.z + pd) - Math.max(pos.z, p.pos.z));
                }
                return supportArea >= bw * bd * 0.9;
            }
            function checkOverhang(pos, dims) { const [w,,d] = dims; return pos.x >= minX && pos.x + w <= maxX && pos.z >= minZ && pos.z + d <= maxZ; }
            class EMSManager {
                constructor(W,H,D){ this.spaces=[{x:0,y:floorLevel,z:0,W,H,D}]; }
                canFit(s,w,h,d){ return w<=s.W && h<=s.H && d<=s.D; }
                addBox(i,[bw,bh,bd]){
                    const s=this.spaces[i], ns=[];
                    if(bw<s.W) ns.push({x:s.x+bw,y:s.y,z:s.z,W:s.W-bw,H:s.H,D:s.D});
                    if(bd<s.D) ns.push({x:s.x,y:s.y,z:s.z+bd,W:bw,H:s.H,D:s.D-bd});
                    if(bh<s.H) ns.push({x:s.x,y:s.y+bh,z:s.z,W:bw,H:s.H-bh,D:bd});
                    this.spaces.splice(i,1);
                    for(const n of ns) if(n.W>1e-4&&n.H>1e-4&&n.D>1e-4) this.spaces.push(n);
                    this.cleanup();
                }
                cleanup(){
                    let f=this.spaces.filter(s=>s.W>1e-4&&s.H>1e-4&&s.D>1e-4);
                    f.sort((a,b) => a.y - b.y || (b.W*b.H*b.D) - (a.W*a.H*a.D));
                    const r=[];
                    for(const s of f){ let c=false; for(const t of r) if(s.x>=t.x&&s.y>=t.y&&s.z>=t.z&&s.x+s.W<=t.x+t.W&&s.y+s.H<=t.y+t.H&&s.z+s.D<=t.z+t.D){c=true; break;} if(!c) r.push(s); }
                    this.spaces=r;
                }
            }
            function findBest(dims, ems, placed) {
                const [bw, bh, bd] = dims;
                let bestScore = Infinity, bestPos = null, bestSpaceIdx = null;
                for (let i = 0; i < ems.spaces.length; i++) {
                    const s = ems.spaces[i];
                    if (!ems.canFit(s, bw, bh, bd)) continue;
                    const candidates = [ {x:Math.max(s.x,minX), z:Math.max(s.z,minZ)}, {x:Math.min(s.x+s.W-bw,maxX-bw), z:Math.max(s.z,minZ)}, {x:Math.max(s.x,minX), z:Math.min(s.z+s.D-bd,maxZ-bd)}, {x:Math.min(s.x+s.W-bw,maxX-bw), z:Math.min(s.z+s.D-bd,maxZ-bd)} ];
                    for (const posCandidate of candidates) {
                        if (posCandidate.x < s.x - 1e-4 || posCandidate.z < s.z - 1e-4) continue;
                        if (posCandidate.x + bw > s.x + s.W + 1e-4) continue;
                        if (posCandidate.z + bd > s.z + s.D + 1e-4) continue;
                        const posTest = { x: posCandidate.x, y: s.y, z: posCandidate.z };
                        if (!checkOverhang(posTest, dims) || !checkSupport(posTest, dims, placed)) continue;
                        const score = posTest.y * 10000 + (1 - (bw*bh*bd)/(s.W*s.H*s.D)) * 100 + posTest.z * 10 + posTest.x;
                        if (score < bestScore) { bestScore = score; bestPos = posTest; bestSpaceIdx = i; }
                    }
                }
                return bestPos ? { pos: bestPos, idx: bestSpaceIdx } : null;
            }
            function pack(seq) {
                const maxH = self.maxH || maxHglobal;
                const ems = new EMSManager(areaW + 2*overhang, maxH, areaD + 2*overhang);
                const placed = []; let maxY = 0, packedVol = 0;
                for (const idx of seq) {
                    const b = boxes[idx];
                    let bestDims = null, bestPos = null, bestSpaceIdx = null, bestScore = Infinity;
                    for (const dims of ors(b.w, b.d, b.h)) {
                        const res = findBest(dims, ems, placed);
                        if (res && res.pos.y * 10000 + dims[1] * 100 < bestScore) { bestScore = res.pos.y * 10000 + dims[1] * 100; bestDims = dims; bestPos = res.pos; bestSpaceIdx = res.idx; }
                    }
                    if (!bestDims) continue;
                    placed.push({ boxIdx: idx, pos: bestPos, dims: bestDims });
                    ems.addBox(bestSpaceIdx, bestDims);
                    const topY = bestPos.y + bestDims[1]; if (topY > maxY) maxY = topY;
                    packedVol += bestDims[0]*bestDims[1]*bestDims[2];
                }
                return { placed, maxY, packedVol };
            }
            function localRepack(placed, unplacedIndices) {
                let bestPlaced = placed.slice(); let improved = true, iterations = 0;
                while (improved && iterations < 50) {
                    improved = false; iterations++;
                    for (const uIdx of unplacedIndices) {
                        const b = boxes[uIdx];
                        for (const dimsU of ors(b.w, b.d, b.h)) {
                            for (let r = 0; r < bestPlaced.length; r++) {
                                const removed = bestPlaced[r];
                                const tempEms = new EMSManager(areaW + 2*overhang, self.maxH || maxHglobal, areaD + 2*overhang);
                                const tempPlaced = []; let canBuild = true;
                                for (let j = 0; j < bestPlaced.length; j++) {
                                    if (j === r) continue;
                                    const p = bestPlaced[j];
                                    const res = findBest(p.dims, tempEms, tempPlaced);
                                    if (!res) { canBuild = false; break; }
                                    tempPlaced.push({ ...p, pos: res.pos }); tempEms.addBox(res.idx, p.dims);
                                }
                                if (!canBuild) continue;
                                const resU = findBest(dimsU, tempEms, tempPlaced);
                                if (!resU) continue;
                                tempPlaced.push({ boxIdx: uIdx, pos: resU.pos, dims: dimsU }); tempEms.addBox(resU.idx, dimsU);
                                const resR = findBest(removed.dims, tempEms, tempPlaced);
                                if (resR) {
                                    tempPlaced.push({ ...removed, pos: resR.pos });
                                    bestPlaced = tempPlaced;
                                    unplacedIndices = unplacedIndices.filter(idx => idx !== uIdx);
                                    improved = true; break;
                                }
                            }
                            if (improved) break;
                        }
                        if (improved) break;
                    }
                }
                return bestPlaced;
            }
            function fitness(seq) { const res = pack(seq); return { count: res.placed.length, score: res.placed.length * 100000 + res.packedVol, maxY: res.maxY }; }
            function randomSeq(n) { const s=[...Array(n).keys()]; for(let i=n-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];} return s; }
            function crossSeq(a,b){const n=a.length,c=Array(n).fill(-1);let s=Math.floor(Math.random()*n),e=Math.floor(Math.random()*n);if(s>e)[s,e]=[e,s];for(let i=s;i<=e;i++)c[i]=a[i];let idx=(e+1)%n;for(let i=0;i<n;i++){const val=b[(e+1+i)%n];if(!c.includes(val)){c[idx]=val;idx=(idx+1)%n;}} return c;}
            function mutSeq(s){const i=Math.floor(Math.random()*s.length),j=Math.floor(Math.random()*s.length);[s[i],s[j]]=[s[j],s[i]];return s;}
            function tournament(pop,scores,k=3){let best=Math.floor(Math.random()*pop.length);for(let i=1;i<k;i++){const id=Math.floor(Math.random()*pop.length);if(scores[id]>scores[best])best=id;} return pop[best];}

            self.onmessage = function(e) {
                const { flatBoxes, params } = e.data;
                boxes = flatBoxes.map(b => ({ ...b }));
                self.maxH = params.maxHeight;
                const n = boxes.length;
                const popSize = params.popSize, gens = params.generations, elite = Math.floor(popSize * 0.1);
                let population = Array.from({ length: popSize }, () => randomSeq(n));
                let bestSeq = null, bestScore = -Infinity, bestPlacedResult = null;
                for (let g = 0; g < gens; g++) {
                    const scores = population.map(seq => fitness(seq).score);
                    const maxScore = Math.max(...scores);
                    const idx = scores.indexOf(maxScore);
                    if (maxScore > bestScore) { bestScore = maxScore; bestSeq = [...population[idx]]; bestPlacedResult = pack(bestSeq); }
                    self.postMessage({ type: 'progress', generation: g + 1, bestCount: bestPlacedResult.placed.length, total: n, score: bestScore });
                    const sorted = scores.map((_, i) => i).sort((a, b) => scores[b] - scores[a]);
                    const newPop = []; for (let i = 0; i < elite; i++) newPop.push([...population[sorted[i]]]);
                    while (newPop.length < popSize) {
                        const p1 = tournament(population, scores), p2 = tournament(population, scores);
                        let child = crossSeq(p1, p2);
                        if (Math.random() < 0.15) child = mutSeq(child);
                        newPop.push(child);
                    }
                    population = newPop;
                }
                let finalPlaced = bestPlacedResult.placed;
                const unplaced = bestSeq.filter(idx => !finalPlaced.some(p => p.boxIdx === idx));
                if (unplaced.length > 0) finalPlaced = localRepack(finalPlaced, unplaced);
                const result = finalPlaced.map(p => ({
                    pos: p.pos, dims: p.dims,
                    color: boxes[p.boxIdx].color,
                    letter: boxes[p.boxIdx].letter,
                    productName: boxes[p.boxIdx].productName || ''
                }));
                self.postMessage({ type: 'result', placed: result, total: n });
            };
        `;

        function initWorker() {
            if (worker) worker.terminate();
            const blob = new Blob([PRO_WORKER_CODE], { type: 'application/javascript' });
            worker = new Worker(URL.createObjectURL(blob));
            worker.onmessage = (e) => {
                const d = e.data;
                if (d.type === 'progress') {
                    elements.gen.textContent = d.generation;
                    elements.fitness.textContent = `${d.bestCount}/${d.total}`;
                    elements.status.textContent = `⚙️ PRO-эволюция: поколение ${d.generation} | уложено: ${d.bestCount}`;
                } else if (d.type === 'result') {
                    isRunning = false;
                    elements.startBtn.disabled = false;
                    elements.status.textContent = `✅ Упаковано ${d.placed.length} из ${d.total} (122×82 см)`;
                    visualize(d.placed);
                }
            };
            worker.onerror = (err) => {
                isRunning = false;
                elements.startBtn.disabled = false;
                elements.status.textContent = '❌ Ошибка алгоритма. Попробуйте снова.';
                console.error(err);
            };
        }

        function resetWorkerAndView() {
            if (isRunning) { worker?.terminate(); isRunning = false; elements.startBtn.disabled = false; }
            visualize([]);
            elements.gen.textContent = '0'; elements.fitness.textContent = '0';
            elements.packed.textContent = `0/${totalCount}`;
            elements.status.textContent = '🔄 Вид сброшен. Паллета 122×82 см';
            updateVolumeStats();
            resetHighlight();
        }

        elements.startBtn.addEventListener('click', () => {
            if (isRunning || flatBoxes.length === 0) return;
            isRunning = true;
            elements.startBtn.disabled = true;
            elements.status.textContent = '🚀 Запуск PRO-эволюции для 122×82 см...';
            initWorker();
            worker.postMessage({ flatBoxes, params: { popSize: parseInt(elements.popSize.value, 10), generations: parseInt(elements.generations.value, 10), maxHeight: parseFloat(elements.maxHeight.value) || 2.0 } });
        });
        elements.resetBtn.addEventListener('click', resetWorkerAndView);
        elements.resetHighlightBtn.addEventListener('click', resetHighlight);
        elements.addBtn.addEventListener('click', addBox);
        elements.clearBtn.addEventListener('click', () => {
            if (isRunning) { worker?.terminate(); isRunning = false; elements.startBtn.disabled = false; }
            boxesData = []; renderBoxList(); visualize([]); elements.status.textContent = '🗑️ Список очищен';
        });
        elements.maxHeight.addEventListener('input', () => updateVolumeStats());
        [elements.inpW, elements.inpD, elements.inpH, elements.inpCnt].forEach(inp => inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') addBox(); }));
        elements.toggleLabelsBtn.addEventListener('click', toggleLabels);
        elements.addProductBtn.addEventListener('click', addProduct);
        elements.productCnt.addEventListener('keydown', (e) => { if (e.key === 'Enter') addProduct(); });

        populateProductSelect();
        renderBoxList();
        visualize([]);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
