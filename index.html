<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Упаковка паллеты — EPAL (шашки прижаты к краям)</title>
    <style>
        body {
            margin: 0; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f0f1a; color: #eee;
        }
        #sidebar {
            position: absolute; top: 20px; left: 20px; bottom: 20px; width: 380px;
            display: flex; flex-direction: column; gap: 20px; pointer-events: none;
            z-index: 10; overflow-y: auto; padding-right: 6px;
        }
        .panel {
            background: rgba(25,30,45,0.9); backdrop-filter: blur(8px);
            padding: 18px 22px; border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.7); border: 1px solid #3a4a6a;
            pointer-events: auto; flex-shrink: 0;
        }
        .panel h3 { margin: 0 0 12px; color: #ffaa00; font-size: 1.2rem; }
        .box-form { display: flex; flex-direction: column; gap: 12px; }
        .input-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .input-group { display: flex; gap: 6px; align-items: center; }
        .input-group label { width: 20px; color: #ccc; }
        .input-group input {
            width: 65px; padding: 8px; border-radius: 8px;
            border: 1px solid #556688; background: #1e2a3a; color: white;
        }
        .box-list {
            max-height: 200px; overflow-y: auto; margin: 10px 0;
            border: 1px solid #3a4a6a; border-radius: 8px; padding: 6px;
            background: #151e28;
        }
        .box-item {
            display: flex; justify-content: space-between; padding: 6px 8px;
            border-bottom: 1px solid #2a3a4a; color: #ddd;
            cursor: pointer; transition: background 0.2s;
        }
        .box-item:hover { background: #2a3a5a; }
        .box-item.selected { background: #3a5a7a; border-left: 3px solid #ffaa00; }
        .box-item button {
            background: #aa3333; border: none; color: white; border-radius: 20px;
            padding: 2px 10px; cursor: pointer;
        }
        .btn {
            background: #2a4a6a; color: white; border: none; padding: 10px 18px;
            border-radius: 30px; font-weight: bold; cursor: pointer;
            border: 1px solid #4a6a8a;
        }
        .btn-primary { background: #ffaa00; color: #111; border-color: #ffcc66; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #stats-panel { display: flex; flex-direction: column; gap: 12px; }
        .stat-row { display: flex; justify-content: space-between; align-items: baseline; }
        .stat-label { font-size: 0.9rem; color: #aaa; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #ffaa00; line-height: 1.2; }
        .stat-small { font-size: 1.2rem; }
        #status-bar {
            position: absolute; bottom: 20px; left: 420px; right: 20px;
            background: rgba(0,0,0,0.6); color: #ffaa00; padding: 8px 20px;
            border-radius: 40px; backdrop-filter: blur(4px); z-index: 15;
            border: 1px solid #ffaa0050; pointer-events: none; text-align: center;
        }
        .box-letter {
            display: inline-block; background: #ffaa00; color: #000; font-weight: bold;
            border-radius: 50%; width: 22px; height: 22px; text-align: center;
            line-height: 22px; margin-right: 8px;
        }
        #sidebar::-webkit-scrollbar { width: 6px; }
        #sidebar::-webkit-scrollbar-thumb { background: #3a4a6a; border-radius: 6px; }
        @media (max-width: 800px) {
            #sidebar { width: 320px; }
            #status-bar { left: 340px; }
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="panel">
            <h3>📦 Коробки (см)</h3>
            <div class="box-form">
                <div class="input-row">
                    <div class="input-group"><label>Ш</label><input id="inp-w" value="30" type="number" step="1" min="1"></div>
                    <div class="input-group"><label>Г</label><input id="inp-d" value="20" type="number" step="1" min="1"></div>
                    <div class="input-group"><label>В</label><input id="inp-h" value="25" type="number" step="1" min="1"></div>
                    <div class="input-group"><label>Кол</label><input id="inp-cnt" value="2" type="number" step="1" min="1" max="100"></div>
                    <button class="btn" id="add-btn" style="flex:1;">➕</button>
                </div>
                <div class="box-list" id="box-list-container"></div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="btn" id="clear-boxes">🗑️ Очистить</button>
                    <button class="btn" id="preset-btn">📋 Стандарт</button>
                    <button class="btn" id="reset-highlight">🔆 Сброс подсветки</button>
                    <button class="btn" id="toggle-labels">🔤 Подписи (вкл)</button>
                </div>
            </div>
        </div>
        <div class="panel">
            <h3>⚙️ Параметры</h3>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <div style="display: flex; justify-content: space-between;">
                    <span>Популяция:</span>
                    <select id="pop-size" style="background:#1e2a3a; color:white; padding:5px; border-radius:8px; width:100px;">
                        <option value="200">200</option><option value="400" selected>400</option>
                        <option value="600">600</option><option value="800">800</option><option value="1000">1000</option>
                    </select>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span>Поколений:</span>
                    <select id="generations" style="background:#1e2a3a; color:white; padding:5px; border-radius:8px; width:100px;">
                        <option value="100">100</option><option value="200" selected>200</option>
                        <option value="300">300</option><option value="400">400</option><option value="500">500</option>
                    </select>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span>Макс. высота (м):</span>
                    <input id="max-height" type="number" value="2.0" min="0.3" max="2.5" step="0.1" style="width:80px; background:#1e2a3a; color:white; padding:5px; border-radius:8px; border:1px solid #556688;">
                </div>
                <button class="btn btn-primary" id="start-ga">🚀 Запустить эволюцию</button>
                <button class="btn" id="stop-reset">🔄 Сбросить вид</button>
            </div>
        </div>
        <div class="panel" id="stats-panel">
            <div class="stat-row"><span class="stat-label">📦 Уложено</span><span class="stat-value" id="packed-count">0/0</span></div>
            <div class="stat-row"><span class="stat-label">📐 Объём коробок</span><span class="stat-value stat-small" id="total-volume">0.000</span><span style="color:#aaa;"> м³</span></div>
            <div class="stat-row"><span class="stat-label">📊 Заполнено</span><span class="stat-value stat-small" id="filled-volume">0.000</span><span style="color:#aaa;"> м³</span></div>
            <div class="stat-row"><span class="stat-label">📈 Эффективность</span><span class="stat-value stat-small" id="efficiency">0.0</span><span style="color:#aaa;"> %</span></div>
            <div class="stat-row"><span class="stat-label">🧬 Поколение</span><span class="stat-value" id="gen-count">0</span></div>
            <div class="stat-row"><span class="stat-label">🎯 Фитнес</span><span class="stat-value" id="best-fitness">0</span></div>
        </div>
    </div>
    <div id="status-bar">🟢 Готов. Добавьте коробки и запустите.</div>

    <script type="importmap">
        {"imports":{
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }}
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

        const AREA_W = 1.2;
        const AREA_D = 0.8;
        const MAX_BOX_DIM = 1.0;
        const COLORS = [0xe67e22, 0x3498db, 0x2ecc71, 0xe74c3c, 0xf1c40f, 0x9b59b6, 0x1abc9c];

        let boxesData = [];
        let flatBoxes = [];
        let totalCount = 0;
        let worker = null;
        let isRunning = false;
        let currentMeshes = [];
        let labelsVisible = true;

        const elements = {
            list: document.getElementById('box-list-container'),
            packed: document.getElementById('packed-count'),
            gen: document.getElementById('gen-count'),
            fitness: document.getElementById('best-fitness'),
            status: document.getElementById('status-bar'),
            totalVolume: document.getElementById('total-volume'),
            filledVolume: document.getElementById('filled-volume'),
            efficiency: document.getElementById('efficiency'),
            inpW: document.getElementById('inp-w'),
            inpD: document.getElementById('inp-d'),
            inpH: document.getElementById('inp-h'),
            inpCnt: document.getElementById('inp-cnt'),
            maxHeight: document.getElementById('max-height'),
            popSize: document.getElementById('pop-size'),
            generations: document.getElementById('generations'),
            startBtn: document.getElementById('start-ga'),
            resetBtn: document.getElementById('stop-reset'),
            resetHighlightBtn: document.getElementById('reset-highlight'),
            addBtn: document.getElementById('add-btn'),
            clearBtn: document.getElementById('clear-boxes'),
            presetBtn: document.getElementById('preset-btn'),
            toggleLabelsBtn: document.getElementById('toggle-labels')
        };

        // ---------- СЦЕНА ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f1420);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(2.2, 1.8, 2.8);
        camera.lookAt(0.6, 0.5, 0.4);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.shadowMap.normalOffset = 0.02;
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0.6, 0.3, 0.4);

        scene.add(new THREE.AmbientLight(0x606080, 1.0));
        const dirLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        dirLight.position.set(2, 5, 3);
        dirLight.castShadow = true; dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024; dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.left = -2; dirLight.shadow.camera.right = 2;
        dirLight.shadow.camera.top = 2; dirLight.shadow.camera.bottom = -2;
        dirLight.shadow.camera.near = 0.5; dirLight.shadow.camera.far = 10;
        scene.add(dirLight);
        const backLight = new THREE.DirectionalLight(0xccddff, 0.6);
        backLight.position.set(-1.5, 0.5, -2);
        scene.add(backLight);
        scene.add(new THREE.PointLight(0x4466ff, 0.4));
        scene.add(new THREE.PointLight(0xffaa66, 0.4));

        // ---------- ПАЛЛЕТА EPAL (шашки прижаты к краям) ----------
        const palletGroup = new THREE.Group();

        const textureLoader = new THREE.TextureLoader();
        const woodTexture = textureLoader.load('https://threejs.org/examples/textures/hardwood2_diffuse.jpg');
        woodTexture.wrapS = THREE.RepeatWrapping; woodTexture.wrapT = THREE.RepeatWrapping;
        woodTexture.repeat.set(2, 1);
        const woodMaterial = new THREE.MeshStandardMaterial({
            map: woodTexture, roughness: 0.7, metalness: 0.05, color: 0xd2b48c
        });

        const blockH = 0.078;
        const bottomH = 0.022;
        const crossH = 0.022;
        const topH = 0.022;
        const totalH = blockH + bottomH + crossH + topH; // 0.144 м
        const roundRadius = 0.003;

        // Нижние доски (лыжи) – прижаты к краям Z
        const bottomWidths = [0.100, 0.145, 0.100];
        const bottomZCenters = [0.05, 0.4, 0.75];
        bottomWidths.forEach((w, i) => {
            const geo = new RoundedBoxGeometry(1.2, bottomH, w, 2, roundRadius);
            const board = new THREE.Mesh(geo, woodMaterial);
            board.position.set(0.6, -totalH + bottomH/2, bottomZCenters[i]);
            board.castShadow = true; board.receiveShadow = true;
            palletGroup.add(board);
        });

        // Шашки (9 шт.) – угловые прижаты к краям (центр на половине ширины от края)
        const edgeDistX = 0.0725; // центр угловой шашки по X (ширина 0.145)
        const edgeDistZ = 0.0725; // центр угловой шашки по Z
        const blockPositions = [
            // Угловые (145×145)
            { x: edgeDistX, z: edgeDistZ, w: 0.145, d: 0.145 },
            { x: edgeDistX, z: AREA_D - edgeDistZ, w: 0.145, d: 0.145 },
            { x: AREA_W - edgeDistX, z: edgeDistZ, w: 0.145, d: 0.145 },
            { x: AREA_W - edgeDistX, z: AREA_D - edgeDistZ, w: 0.145, d: 0.145 },
            // Центральные по бокам (145×100)
            { x: edgeDistX, z: 0.4, w: 0.145, d: 0.100 },
            { x: AREA_W - edgeDistX, z: 0.4, w: 0.145, d: 0.100 },
            { x: 0.6, z: edgeDistZ, w: 0.145, d: 0.100 },
            { x: 0.6, z: AREA_D - edgeDistZ, w: 0.145, d: 0.100 },
            // Центральная (145×100)
            { x: 0.6, z: 0.4, w: 0.145, d: 0.100 }
        ];
        blockPositions.forEach(bp => {
            const geo = new RoundedBoxGeometry(bp.w, blockH, bp.d, 2, roundRadius);
            const block = new THREE.Mesh(geo, woodMaterial);
            block.position.set(bp.x, -totalH + bottomH + blockH/2, bp.z);
            block.castShadow = true; block.receiveShadow = true;
            palletGroup.add(block);
        });

        // Поперечные доски (3 шт.) – опираются на шашки, центры совпадают с шашками по X
        const crossXCenters = [edgeDistX, 0.6, AREA_W - edgeDistX];
        crossXCenters.forEach(x => {
            const geo = new RoundedBoxGeometry(0.145, crossH, 0.8, 2, roundRadius);
            const cross = new THREE.Mesh(geo, woodMaterial);
            cross.position.set(x, -totalH + bottomH + blockH + crossH/2, 0.4);
            cross.castShadow = true; cross.receiveShadow = true;
            palletGroup.add(cross);
        });

        // Верхний настил (5 досок, равномерные зазоры)
        const topWidths = [0.145, 0.100, 0.145, 0.100, 0.145];
        const topTotalWidth = topWidths.reduce((a, b) => a + b, 0);
        const topGaps = (AREA_D - topTotalWidth) / (topWidths.length - 1);
        let zPos = 0;
        topWidths.forEach((w, i) => {
            const geo = new RoundedBoxGeometry(1.2, topH, w, 2, roundRadius);
            const board = new THREE.Mesh(geo, woodMaterial);
            const centerZ = zPos + w/2;
            board.position.set(0.6, -totalH + bottomH + blockH + crossH + topH/2, centerZ);
            board.castShadow = true; board.receiveShadow = true;
            palletGroup.add(board);
            zPos += w + (i < topWidths.length - 1 ? topGaps : 0);
        });

        // Клеймо EPAL
        const stampCanvas = document.createElement('canvas');
        stampCanvas.width = 128; stampCanvas.height = 64;
        const ctx = stampCanvas.getContext('2d');
        ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, stampCanvas.width, stampCanvas.height);
        ctx.font = 'bold 28px Arial'; ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('EPAL', stampCanvas.width/2, stampCanvas.height/2);
        const stampTexture = new THREE.CanvasTexture(stampCanvas);
        const stampMaterial = new THREE.MeshBasicMaterial({ map: stampTexture, transparent: true });
        const stampGeo = new THREE.PlaneGeometry(0.12, 0.05);
        const stamp = new THREE.Mesh(stampGeo, stampMaterial);
        stamp.position.set(edgeDistX, -totalH + bottomH + blockH + 0.01, edgeDistZ + 0.145/2 + 0.001);
        stamp.rotation.y = Math.PI / 2;
        palletGroup.add(stamp);

        scene.add(palletGroup);

        // Рамка
        const borderMaterial = new THREE.LineBasicMaterial({ color: 0xffaa00 });
        const borderPoints = [
            new THREE.Vector3(0, 0.001, 0), new THREE.Vector3(AREA_W, 0.001, 0),
            new THREE.Vector3(AREA_W, 0.001, AREA_D), new THREE.Vector3(0, 0.001, AREA_D),
            new THREE.Vector3(0, 0.001, 0)
        ];
        const borderGeo = new THREE.BufferGeometry().setFromPoints(borderPoints);
        scene.add(new THREE.Line(borderGeo, borderMaterial));

        const sizeLabelDiv = document.createElement('div');
        sizeLabelDiv.textContent = '120 × 80 см';
        sizeLabelDiv.style.cssText = 'color:#ccc;font-size:12px;background:#00000080;padding:2px 8px;border-radius:12px;pointer-events:none;';
        const sizeLabel = new CSS2DObject(sizeLabelDiv);
        sizeLabel.position.set(AREA_W/2, 0.1, AREA_D/2);
        scene.add(sizeLabel);

        const boxesGroup = new THREE.Group();
        scene.add(boxesGroup);

        // ---------- УТИЛИТЫ ----------
        function getLetter(index) {
            let n = index, result = '';
            while (n >= 0) { result = String.fromCharCode(65 + (n % 26)) + result; n = Math.floor(n / 26) - 1; }
            return result;
        }
        function calculateTotalVolume() { return boxesData.reduce((s, b) => s + b.w * b.d * b.h * b.count, 0); }
        function updateVolumeStats(_, placedVolume = null) {
            const maxH = parseFloat(elements.maxHeight.value) || 2.0;
            const maxVol = AREA_W * AREA_D * maxH;
            const totalVol = calculateTotalVolume();
            elements.totalVolume.textContent = totalVol.toFixed(3);
            if (placedVolume !== null) {
                elements.filledVolume.textContent = placedVolume.toFixed(3);
                elements.efficiency.textContent = (maxVol > 0 ? (placedVolume / maxVol * 100) : 0).toFixed(1);
            } else {
                elements.filledVolume.textContent = '0.000';
                elements.efficiency.textContent = '0.0';
            }
        }
        function rebuildFlatBoxes() {
            flatBoxes = [];
            boxesData.forEach((b, typeIdx) => {
                for (let i = 0; i < b.count; i++) {
                    flatBoxes.push({ w:b.w, d:b.d, h:b.h, color:b.color, letter:b.letter, typeIdx });
                }
            });
            totalCount = flatBoxes.length;
            updateVolumeStats();
        }
        function createBoxItemElement(b, index) {
            const div = document.createElement('div');
            div.className = 'box-item';
            div.dataset.letter = b.letter;
            const volume = (b.w * b.d * b.h).toFixed(4);
            const span = document.createElement('span');
            const letterSpan = document.createElement('span');
            letterSpan.className = 'box-letter';
            letterSpan.textContent = b.letter;
            span.appendChild(letterSpan);
            span.appendChild(document.createTextNode(`${Math.round(b.w*100)}x${Math.round(b.d*100)}x${Math.round(b.h*100)} (${b.count} шт)`));
            const volSpan = document.createElement('span');
            volSpan.style.cssText = 'color:#aaa;font-size:0.8rem;';
            volSpan.textContent = ` ${volume} м³`;
            span.appendChild(volSpan);
            const removeBtn = document.createElement('button');
            removeBtn.textContent = '✖';
            removeBtn.dataset.idx = index;
            div.appendChild(span);
            div.appendChild(removeBtn);
            div.addEventListener('click', (e) => {
                if (e.target.tagName !== 'BUTTON') highlightByLetter(b.letter);
            });
            return div;
        }
        function renderBoxList() {
            elements.list.innerHTML = '';
            boxesData.forEach((b, i) => {
                const itemEl = createBoxItemElement(b, i);
                elements.list.appendChild(itemEl);
                itemEl.querySelector('button').addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeBox(i);
                });
            });
            rebuildFlatBoxes();
            elements.packed.textContent = `0/${totalCount}`;
            elements.fitness.textContent = '0';
        }
        function removeBox(index) {
            boxesData.splice(index, 1);
            boxesData.forEach((b, i) => b.letter = getLetter(i));
            renderBoxList();
            visualize([]);
        }

        function highlightByLetter(letter) {
            currentMeshes.forEach(item => {
                if (!item.mesh) return;
                const needHighlight = (item.letter === letter);
                if (!item.originalMaterial) item.originalMaterial = item.mesh.material;
                if (needHighlight) {
                    item.mesh.material = item.originalMaterial;
                    if (Array.isArray(item.mesh.material)) {
                        item.mesh.material.forEach(m => { m.transparent = false; m.opacity = 1; m.depthWrite = true; });
                    } else {
                        item.mesh.material.transparent = false;
                        item.mesh.material.opacity = 1;
                        item.mesh.material.depthWrite = true;
                    }
                } else {
                    const color = item.originalMaterial.color || new THREE.Color(0xffffff);
                    const transparentMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.2, depthWrite: false });
                    item.mesh.material = transparentMat;
                }
            });
            document.querySelectorAll('.box-item').forEach(el => {
                el.classList.remove('selected');
                if (el.dataset.letter === letter) el.classList.add('selected');
            });
        }
        function resetHighlight() {
            currentMeshes.forEach(item => {
                if (!item.mesh || !item.originalMaterial) return;
                item.mesh.material = item.originalMaterial;
                if (Array.isArray(item.mesh.material)) {
                    item.mesh.material.forEach(m => { m.transparent = false; m.opacity = 1; m.depthWrite = true; });
                } else {
                    item.mesh.material.transparent = false;
                    item.mesh.material.opacity = 1;
                    item.mesh.material.depthWrite = true;
                }
            });
            document.querySelectorAll('.box-item').forEach(el => el.classList.remove('selected'));
        }
        function updateLabelsVisibility() { currentMeshes.forEach(i => i.label && (i.label.visible = labelsVisible)); }
        function toggleLabels() {
            labelsVisible = !labelsVisible;
            elements.toggleLabelsBtn.textContent = labelsVisible ? '🔤 Подписи (вкл)' : '🔤 Подписи (выкл)';
            updateLabelsVisibility();
        }

        function visualize(placed) {
            while (boxesGroup.children.length > 0) {
                const child = boxesGroup.children[0];
                if (child.isMesh) {
                    child.geometry?.dispose();
                    if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
                    else child.material?.dispose();
                } else if (child.isLine) {
                    child.geometry.dispose();
                    if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
                    else child.material?.dispose();
                }
                boxesGroup.remove(child);
            }
            currentMeshes = [];
            if (!placed?.length) {
                elements.packed.textContent = `0/${totalCount}`;
                updateVolumeStats();
                return;
            }
            let placedVolume = 0;
            placed.forEach(item => {
                const { dims, pos, color, letter } = item;
                const [w, h, d] = dims;
                placedVolume += w * h * d;
                const geo = new THREE.BoxGeometry(w, h, d);
                const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.4 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.castShadow = true; mesh.receiveShadow = true;
                mesh.position.set(pos.x + w/2, pos.y + h/2, pos.z + d/2);
                boxesGroup.add(mesh);

                const edges = new THREE.EdgesGeometry(geo);
                const lineMat = new THREE.LineBasicMaterial({ color: 0x000000 });
                const line = new THREE.LineSegments(edges, lineMat);
                line.position.copy(mesh.position);
                boxesGroup.add(line);

                const original = boxesData.find(b => b.letter === letter);
                const origText = original ? `${Math.round(original.w*100)}×${Math.round(original.d*100)}×${Math.round(original.h*100)}` : '';
                const labelDiv = document.createElement('div');
                labelDiv.textContent = origText
                    ? `${letter} (${origText}) → ${Math.round(w*100)}×${Math.round(h*100)}×${Math.round(d*100)}`
                    : `${letter} ${Math.round(w*100)}×${Math.round(h*100)}×${Math.round(d*100)}`;
                labelDiv.style.cssText = 'color:#fff;font-size:10px;background:#000c;padding:2px 6px;border-radius:10px;font-weight:bold;pointer-events:none;';
                const labelObj = new CSS2DObject(labelDiv);
                labelObj.position.set(pos.x + w/2, pos.y + h + 0.03, pos.z + d/2);
                labelObj.visible = labelsVisible;
                boxesGroup.add(labelObj);
                currentMeshes.push({ mesh, line, letter, label: labelObj, originalMaterial: mat });
            });
            elements.packed.textContent = `${placed.length}/${totalCount}`;
            elements.fitness.textContent = `${placed.length}/${totalCount}`;
            updateVolumeStats(placed.length, placedVolume);
            resetHighlight();
        }

        function addBox() {
            const w = parseFloat(elements.inpW.value) / 100;
            const d = parseFloat(elements.inpD.value) / 100;
            const h = parseFloat(elements.inpH.value) / 100;
            const cnt = parseInt(elements.inpCnt.value, 10);
            if (isNaN(w) || isNaN(d) || isNaN(h) || isNaN(cnt)) return;
            if (w <= 0 || d <= 0 || h <= 0 || cnt <= 0) return;
            if (w > MAX_BOX_DIM || d > MAX_BOX_DIM || h > MAX_BOX_DIM) {
                alert(`Размеры коробки не должны превышать ${MAX_BOX_DIM*100} см`);
                return;
            }
            boxesData.push({ w, d, h, count: cnt, color: COLORS[boxesData.length % COLORS.length], letter: getLetter(boxesData.length) });
            renderBoxList();
            visualize([]);
        }
        function setPreset() {
            boxesData = [
                { w:0.30,d:0.20,h:0.25,count:3,color:0xe67e22 },
                { w:0.25,d:0.25,h:0.30,count:4,color:0x3498db },
                { w:0.40,d:0.30,h:0.20,count:2,color:0x2ecc71 },
                { w:0.35,d:0.20,h:0.35,count:3,color:0xe74c3c },
                { w:0.20,d:0.15,h:0.15,count:5,color:0xf1c40f },
                { w:0.45,d:0.35,h:0.25,count:2,color:0x9b59b6 }
            ];
            boxesData.forEach((b,i) => b.letter = getLetter(i));
            renderBoxList();
            visualize([]);
        }

        // ---------- WORKER (EMS без пересечений) ----------
        function getWorkerCode() {
            return `
                const areaW = 1.2, areaD = 0.8;
                let boxes = [], maxHglobal = 2.0;
                function ors(w,d,h){ return [[w,h,d],[d,h,w],[h,w,d],[h,d,w],[w,d,h],[d,w,h]]; }
                class EMSManager {
                    constructor(W,H,D){ this.spaces=[{x:0,y:0,z:0,W,H,D}]; }
                    canFit(s,w,h,d){ return w<=s.W && h<=s.H && d<=s.D; }
                    addBox(i,[bw,bh,bd]){
                        const s=this.spaces[i], ns=[];
                        if(bw<s.W) ns.push({x:s.x+bw,y:s.y,z:s.z,W:s.W-bw,H:s.H,D:s.D});
                        if(bd<s.D) ns.push({x:s.x,y:s.y,z:s.z+bd,W:bw,H:s.H,D:s.D-bd});
                        if(bh<s.H) ns.push({x:s.x,y:s.y+bh,z:s.z,W:bw,H:s.H-bh,D:bd});
                        this.spaces.splice(i,1);
                        for(const n of ns) if(n.W>1e-4&&n.H>1e-4&&n.D>1e-4) this.spaces.push(n);
                        this.cleanup();
                    }
                    cleanup(){
                        let f=this.spaces.filter(s=>s.W>1e-4&&s.H>1e-4&&s.D>1e-4);
                        const r=[];
                        for(const s of f){
                            let c=false;
                            for(const t of r) if(s.x>=t.x&&s.y>=t.y&&s.z>=t.z&&s.x+s.W<=t.x+t.W&&s.y+s.H<=t.y+t.H&&s.z+s.D<=t.z+t.D){c=true; break;}
                            if(!c) r.push(s);
                        }
                        this.spaces=r;
                    }
                }
                function findBest(dims,ems){
                    const [bw,bh,bd]=dims; let best=null,bestScore=1/0;
                    for(let i=0;i<ems.spaces.length;i++){
                        const s=ems.spaces[i]; if(!ems.canFit(s,bw,bh,bd)) continue;
                        const p={x:s.x,y:s.y,z:s.z}, score=p.z*1e4+p.y*100+p.x;
                        if(score<bestScore){ bestScore=score; best={pos:p,idx:i}; }
                    }
                    return best;
                }
                function pack(seq,orient){
                    const maxH=self.maxH||maxHglobal, ems=new EMSManager(areaW,maxH,areaD);
                    const placed=[];
                    for(let i=0;i<seq.length;i++){
                        const b=boxes[seq[i]], dims=ors(b.w,b.d,b.h)[orient[i]%6];
                        const best=findBest(dims,ems);
                        if(!best) continue;
                        placed.push({boxIdx:seq[i],pos:best.pos,dims:[dims[0],dims[1],dims[2]]});
                        ems.addBox(best.idx,[dims[0],dims[1],dims[2]]);
                    }
                    return placed;
                }
                function fitness(s,o){ return pack(s,o).length; }
                function randomInd(n){
                    const s=[...Array(n).keys()];
                    for(let i=n-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [s[i],s[j]]=[s[j],s[i]]; }
                    return {seq:s,orient:Array.from({length:n},()=>Math.floor(Math.random()*6))};
                }
                function crossSeq(a,b){
                    const n=a.length,c=Array(n).fill(-1);
                    let s=Math.floor(Math.random()*n), e=Math.floor(Math.random()*n);
                    if(s>e) [s,e]=[e,s];
                    for(let i=s;i<=e;i++) c[i]=a[i];
                    let idx=(e+1)%n, bIdx=(e+1)%n;
                    while(c.includes(-1)){
                        const g=b[bIdx];
                        if(!c.includes(g)){ c[idx]=g; idx=(idx+1)%n; }
                        bIdx=(bIdx+1)%n;
                    }
                    return c;
                }
                function crossOrient(a,b){ const p=Math.floor(Math.random()*a.length); return a.slice(0,p).concat(b.slice(p)); }
                function mutSeq(s){ const i=Math.floor(Math.random()*s.length),j=Math.floor(Math.random()*s.length); [s[i],s[j]]=[s[j],s[i]]; return s; }
                function mutOrient(o,r=0.1){ return o.map(v=>Math.random()<r?Math.floor(Math.random()*6):v); }
                function tournament(pop,fits,k=3){
                    let best=Math.floor(Math.random()*pop.length);
                    for(let i=1;i<k;i++){ const id=Math.floor(Math.random()*pop.length); if(fits[id]>fits[best]) best=id; }
                    return pop[best];
                }
                self.onmessage=function(e){
                    const {flatBoxes,params}=e.data;
                    boxes=flatBoxes.map(b=>({...b}));
                    self.maxH=params.maxHeight;
                    const n=boxes.length, popSize=params.popSize, gens=params.generations, elite=Math.floor(popSize*0.1);
                    let population=Array.from({length:popSize},()=>randomInd(n));
                    let best=null, bestFit=-1;
                    for(let g=0;g<gens;g++){
                        const fits=population.map(ind=>fitness(ind.seq,ind.orient));
                        const maxFit=Math.max(...fits), idx=fits.indexOf(maxFit);
                        if(maxFit>bestFit){ bestFit=maxFit; best={seq:[...population[idx].seq],orient:[...population[idx].orient]}; }
                        self.postMessage({type:'progress',generation:g+1,bestFitness:maxFit,total:n});
                        const sorted=fits.map((_,i)=>i).sort((a,b)=>fits[b]-fits[a]);
                        const newPop=[];
                        for(let i=0;i<elite;i++){
                            const ind=population[sorted[i]];
                            newPop.push({seq:[...ind.seq],orient:[...ind.orient]});
                        }
                        while(newPop.length<popSize){
                            const p1=tournament(population,fits), p2=tournament(population,fits);
                            let child={seq:crossSeq(p1.seq,p2.seq),orient:crossOrient(p1.orient,p2.orient)};
                            if(Math.random()<0.15) child.seq=mutSeq(child.seq);
                            child.orient=mutOrient(child.orient,0.08);
                            newPop.push(child);
                        }
                        population=newPop;
                    }
                    const placed=pack(best.seq,best.orient);
                    const result=placed.map(p=>({pos:p.pos,dims:p.dims,color:boxes[p.boxIdx].color,letter:boxes[p.boxIdx].letter}));
                    self.postMessage({type:'result',placed:result,total:n});
                };
            `;
        }

        function initWorker() {
            if (worker) worker.terminate();
            worker = new Worker(URL.createObjectURL(new Blob([getWorkerCode()], {type:'application/javascript'})));
            worker.onmessage = (e) => {
                const d = e.data;
                if (d.type === 'progress') {
                    elements.gen.textContent = d.generation;
                    elements.fitness.textContent = `${d.bestFitness}/${d.total}`;
                    elements.status.textContent = `⚙️ Поколение ${d.generation} | Уложено: ${d.bestFitness}`;
                } else if (d.type === 'result') {
                    isRunning = false;
                    elements.startBtn.disabled = false;
                    elements.status.textContent = `✅ Упаковано ${d.placed.length} из ${d.total}`;
                    visualize(d.placed);
                }
            };
        }

        function resetWorkerAndView() {
            if (isRunning) { worker?.terminate(); isRunning = false; elements.startBtn.disabled = false; }
            visualize([]);
            elements.gen.textContent = '0'; elements.fitness.textContent = '0';
            elements.packed.textContent = `0/${totalCount}`;
            elements.status.textContent = '🟢 Сброшено.';
            updateVolumeStats();
            resetHighlight();
        }

        elements.startBtn.addEventListener('click', () => {
            if (isRunning || flatBoxes.length === 0) return;
            isRunning = true;
            elements.startBtn.disabled = true;
            elements.status.textContent = '🚀 Запуск эволюции...';
            initWorker();
            worker.postMessage({
                flatBoxes,
                params: {
                    popSize: parseInt(elements.popSize.value, 10),
                    generations: parseInt(elements.generations.value, 10),
                    maxHeight: parseFloat(elements.maxHeight.value) || 2.0
                }
            });
        });
        elements.resetBtn.addEventListener('click', resetWorkerAndView);
        elements.resetHighlightBtn.addEventListener('click', resetHighlight);
        elements.addBtn.addEventListener('click', addBox);
        elements.clearBtn.addEventListener('click', () => { boxesData = []; renderBoxList(); visualize([]); });
        elements.presetBtn.addEventListener('click', setPreset);
        elements.maxHeight.addEventListener('input', () => updateVolumeStats());
        [elements.inpW, elements.inpD, elements.inpH, elements.inpCnt].forEach(inp =>
            inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') addBox(); })
        );
        elements.toggleLabelsBtn.addEventListener('click', toggleLabels);

        setPreset();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
